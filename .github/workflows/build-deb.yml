name: Build Debian package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential fakeroot dh-python python3-all python3-setuptools python3-wheel equivs lintian

      - name: Build .deb package
        run: |
          dpkg-buildpackage -us -uc -b
        env:
          DEBEMAIL: "apandada1@gmail.com"
          DEBFULLNAME: "Archisman Panigrahi"

      - name: Stage .deb artifacts
        run: |
          mkdir -p dist
          cp ../*.deb dist/

      - name: List generated files
        run: ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb

      - name: Upload .deb to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
